name: PR Gates

on:
  pull_request:
    branches:
      - main

jobs:
  pr-gates:
    name: pr-gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Aegis policy checks
        run: node policy/scripts/run-all.mjs
